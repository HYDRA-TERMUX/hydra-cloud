<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: monospace; }
    .t   { font-size:13px; font-weight:bold; fill:#085041; }
    .sub { font-size:11px; fill:#3d6b62; }
    .tb  { font-size:13px; font-weight:bold; fill:#3C3489; }
    .ta  { font-size:13px; font-weight:bold; fill:#854F0B; }
    .tbl { font-size:13px; font-weight:bold; fill:#185FA5; }
    .tg  { font-size:13px; font-weight:bold; fill:#3d3d3a; }
    .cap { font-size:11px; fill:#555; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Android Phone container -->
  <rect x="30" y="50" width="275" height="370" rx="20"
        fill="#E1F5EE" fill-opacity="0.35" stroke="#0F6E56" stroke-width="1"/>
  <text class="t" x="168" y="80" text-anchor="middle">Android Phone</text>
  <text class="sub" x="168" y="97" text-anchor="middle">Termux environment</text>

  <!-- hydra.sh box -->
  <rect x="55" y="115" width="225" height="54" rx="8"
        fill="#9FE1CB" fill-opacity="0.55" stroke="#0F6E56" stroke-width="0.8"/>
  <text class="t" x="168" y="139" text-anchor="middle">hydra.sh</text>
  <text class="sub" x="168" y="156" text-anchor="middle">Launcher menu + setup</text>

  <!-- hydra_server.py box -->
  <rect x="55" y="205" width="225" height="54" rx="8"
        fill="#EEEDFE" fill-opacity="0.7" stroke="#534AB7" stroke-width="0.8"/>
  <text class="tb" x="168" y="229" text-anchor="middle">hydra_server.py</text>
  <text class="sub" x="168" y="246" text-anchor="middle">Flask · port 8888 · threaded</text>

  <!-- Storage box -->
  <rect x="55" y="295" width="225" height="54" rx="8"
        fill="#FAEEDA" fill-opacity="0.7" stroke="#854F0B" stroke-width="0.8"/>
  <text class="ta" x="168" y="319" text-anchor="middle">HYDRACloud/</text>
  <text class="sub" x="168" y="336" text-anchor="middle">~/storage/shared</text>

  <!-- Internal arrows -->
  <line x1="168" y1="169" x2="168" y2="203" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="168" y1="259" x2="168" y2="293" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- WiFi bubble -->
  <ellipse cx="470" cy="237" rx="64" ry="38"
           fill="#F1EFE8" fill-opacity="0.6" stroke="#5F5E5A" stroke-width="0.8"/>
  <text class="tg" x="470" y="233" text-anchor="middle">WiFi LAN</text>
  <text class="sub" x="470" y="250" text-anchor="middle">port 8888</text>

  <!-- Bidirectional arrow phone ↔ wifi -->
  <line x1="307" y1="237" x2="404" y2="237" stroke="#888" stroke-width="1.5"
        marker-end="url(#arr)" marker-start="url(#arr)"/>

  <!-- Laptop -->
  <rect x="556" y="92" width="98" height="50" rx="8"
        fill="#E6F1FB" fill-opacity="0.7" stroke="#185FA5" stroke-width="0.8"/>
  <text class="tbl" x="605" y="115" text-anchor="middle">Laptop</text>
  <text class="sub" x="605" y="131" text-anchor="middle">Browser</text>

  <!-- Phone 2 -->
  <rect x="556" y="187" width="98" height="50" rx="8"
        fill="#E6F1FB" fill-opacity="0.7" stroke="#185FA5" stroke-width="0.8"/>
  <text class="tbl" x="605" y="210" text-anchor="middle">Phone 2</text>
  <text class="sub" x="605" y="226" text-anchor="middle">Browser</text>

  <!-- Tablet -->
  <rect x="556" y="282" width="98" height="50" rx="8"
        fill="#E6F1FB" fill-opacity="0.7" stroke="#185FA5" stroke-width="0.8"/>
  <text class="tbl" x="605" y="305" text-anchor="middle">Tablet</text>
  <text class="sub" x="605" y="321" text-anchor="middle">Browser</text>

  <!-- Arrows wifi → devices -->
  <line x1="534" y1="220" x2="554" y2="170" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="534" y1="237" x2="554" y2="218" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="534" y1="254" x2="554" y2="285" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Caption row -->
  <text class="cap" x="168" y="405" text-anchor="middle">Upload · Download · Stream · Device Health</text>
  <text class="cap" x="470" y="302" text-anchor="middle">No internet needed</text>
  <text class="cap" x="470" y="317" text-anchor="middle">100% private · LAN only</text>
</svg>
